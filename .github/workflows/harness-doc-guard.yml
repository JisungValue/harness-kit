name: Harness Doc Guard

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-doc-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run harness documentation guard
        run: python scripts/check_harness_docs.py
